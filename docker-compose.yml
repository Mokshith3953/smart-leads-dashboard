version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart-leads

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
